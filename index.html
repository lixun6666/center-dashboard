<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中心看板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .container {
      max-width: 640px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      padding: 40px 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 24px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #999;
      margin-bottom: 32px;
    }
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: #f7f8fa;
      border-radius: 8px;
      text-decoration: none;
      color: #333;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .card:hover {
      background: #e6f0ff;
      border-color: #4a90d9;
      transform: translateX(4px);
    }
    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-right: 16px;
      flex-shrink: 0;
    }
    .overview { background: #e6f0ff; color: #4a90d9; }
    .sorting { background: #e8f5e9; color: #52c41a; }
    .loading { background: #fff3e0; color: #fa8c16; }
    .unloading { background: #fce4ec; color: #e91e63; }
    .card-title { font-size: 16px; font-weight: 500; }
    .card-desc { font-size: 12px; color: #999; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>中心看板</h1>
    <p class="subtitle">快递路由规划与监控系统 · 看板原型</p>
    <div class="card-list">
      <a class="card" href="08-原型终稿/概览看板-独立版V2.14.html">
        <div class="card-icon overview">📊</div>
        <div>
          <div class="card-title">概览看板</div>
          <div class="card-desc">全流程作业流水线、积压拆分、异常监控</div>
        </div>
      </a>
      <a class="card" href="08-原型终稿/分拣区看板-独立版V3.09.html">
        <div class="card-icon sorting">📦</div>
        <div>
          <div class="card-title">分拣区看板</div>
          <div class="card-desc">分拣作业进度、效率指标</div>
        </div>
      </a>
      <a class="card" href="08-原型终稿/卸车区看板-优化版V2.08.html">
        <div class="card-icon unloading">🚛</div>
        <div>
          <div class="card-title">卸车区看板</div>
          <div class="card-desc">到车卸车进度、排队等待</div>
        </div>
      </a>
      <a class="card" href="08-原型终稿/装车区看板-优化班次V2.10.html">
        <div class="card-icon loading">📤</div>
        <div>
          <div class="card-title">装车区看板</div>
          <div class="card-desc">装车签出进度、发车状态</div>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
